name: Tests

# Кога: при всеки push и при Pull Request към main.
on:
  push:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Изтегляне на кода
        uses: actions/checkout@v4

      - name: Настройка на Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Инсталиране на зависимостите
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Пускане на тестовете
        run: python -m pytest
